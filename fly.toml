# fly.toml app configuration file generated for stremio-purge on 2026-03-27T01:35:12Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'stremio-purge'
primary_region = 'lhr'

[build]

[env]
  PORT = '8080'

[[mounts]]
  source = 'stremio_purge_data'
  destination = '/data'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 1
  processes = ['app']

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 1024
